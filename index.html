<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANON — 익명 방명록</title>

  <!-- ══════════════════════════════════════════════ -->
<!--  🔥 Firebase SDK                              -->
<!-- ══════════════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- ══════════════════════════════════════════════ -->
<!--  🔥 FIREBASE CONFIG — 여기에 본인 설정 입력    -->
<!-- ══════════════════════════════════════════════ -->
<script src="firebase-app-compat.js">
  apiKey: "AIzaSyALmi9bFPlxlv8h8YT3RDviVswF8qJLhMo",
  authDomain: "test-b933c.firebaseapp.com",
  databaseURL: "https://test-b933c-default-rtdb.firebaseio.com",
  projectId: "test-b933c",
  storageBucket: "test-b933c.firebasestorage.app",
  messagingSenderId: "982341907625",
  appId: "1:982341907625:web:4c90213e6ebb9d7ac465b8"
};
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="logo">ANON<span>.ask</span></div>
  <div class="header-right">
    <div class="logged-in-badge" id="logged-in-badge" style="display:none"></div>
    <button class="btn-icon" onclick="openLoginModal()" title="내 코드 입력" id="btn-login-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2l-9.6 9.6"/><path d="M15.5 7.5l3 3L22 7l-3-3"/></svg>
    </button>
    <button class="btn-icon" onclick="showToast('알림 기능 준비 중이에요 🔔')" title="알림">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </button>
  </div>
</header>

<div class="container">

  <!-- ════ SCREEN 1: USER LIST ════ -->
  <div id="screen-list" class="screen active">
    <div class="section-tab">
      <button class="tab-btn active">방명록 목록</button>
      <button class="tab-btn" onclick="showToast('준비 중인 기능입니다 👀')">인기</button>
      <button class="tab-btn" onclick="showToast('준비 중인 기능입니다 👀')">최신</button>
    </div>
    <div id="loading-users" class="loading-state">
      <div class="spinner"></div>
      <p>불러오는 중...</p>
    </div>
    <div class="user-list" id="user-list"></div>
  </div>

  <!-- ════ SCREEN 2: BOARD ════ -->
  <div id="screen-board" class="screen">
    <div class="board-header">
      <button class="btn-back" onclick="goBack()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="board-title" id="board-title"></span>
    </div>

    <div class="board-profile">
      <div class="board-avatar" id="board-avatar"></div>
      <div class="board-name" id="board-name"></div>
      <div class="board-code" id="board-code-display"></div>
      <div class="board-stats">
        <div class="stat"><div class="stat-num" id="stat-posts">0</div><div class="stat-label">메시지</div></div>
        <div class="stat"><div class="stat-num" id="stat-answers">0</div><div class="stat-label">답변</div></div>
      </div>
    </div>

    <div class="write-box">
      <div class="write-box-label">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        익명 메시지 남기기
      </div>
      <textarea id="write-text" rows="3" maxlength="200"
        placeholder="익명으로 메시지를 남겨보세요... (최대 200자)"
        oninput="updateCharCount()"></textarea>
      <div class="write-actions">
        <span class="char-count"><span id="char-count">0</span>/200</span>
        <button class="btn-send" onclick="submitMessage()">보내기</button>
      </div>
    </div>

    <div id="loading-posts" class="loading-state" style="display:none">
      <div class="spinner"></div><p>불러오는 중...</p>
    </div>
    <div class="posts" id="posts-container"></div>
  </div>

</div><!-- /container -->

<!-- ════ MODAL: Login ════ -->
<div class="modal-overlay" id="modal-login">
  <div class="modal">
    <div class="modal-title">🔑 내 코드 입력</div>
    <div class="modal-sub">부여받은 개인 코드를 입력하면<br>해당 방명록에 답변할 수 있어요.</div>
    <input type="text" id="input-code" placeholder="예: USER-ALPHA-001" oninput="clearLoginError()">
    <div class="modal-error" id="login-error">코드가 올바르지 않아요. 다시 확인해 주세요.</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-login')">취소</button>
      <button class="btn-confirm" onclick="loginWithCode()">인증하기</button>
    </div>
  </div>
</div>

<!-- ════ MODAL: Answer ════ -->
<div class="modal-overlay" id="modal-answer">
  <div class="modal">
    <div class="modal-title">💬 답변 작성</div>
    <div class="modal-sub" id="answer-q-preview"
      style="background:var(--sky-pale);border-radius:8px;padding:10px 12px;color:var(--gray-700)"></div>
    <textarea id="answer-text" rows="4" maxlength="300"
      placeholder="답변을 입력해 주세요... (최대 300자)"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-answer')">취소</button>
      <button class="btn-confirm" onclick="submitAnswer()">답변 등록</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, doc, getDocs, addDoc, updateDoc,
    query, orderBy, onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ══════════════════════════════════════════
  // 🔥 여기에 Firebase 설정값을 붙여넣으세요
  // ══════════════════════════════════════════
  const firebaseConfig = {
    apiKey:            "여기에_apiKey_입력",
    authDomain:        "여기에_authDomain_입력",
    projectId:         "여기에_projectId_입력",
    storageBucket:     "여기에_storageBucket_입력",
    messagingSenderId: "여기에_messagingSenderId_입력",
    appId:             "여기에_appId_입력"
  };
  // ══════════════════════════════════════════

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── 사용자(방명록 주인) 목록 ──────────────────
  // Firestore 'users' 컬렉션에 저장하거나 아래 배열로 관리
  // 추가/삭제는 여기만 수정하면 돼요
  window.USERS = [
    { id: 'USER-ALPHA-001', name: '닉넴변경함', handle: '1ky10yk',    emoji: '🐼' },
    { id: 'USER-BETA-002',  name: '샤인머스캣', handle: '90grape',    emoji: '🍇' },
    { id: 'USER-GAMMA-003', name: 'ttuu',       handle: 'tttuuu',     emoji: '🎵' },
    { id: 'USER-DELTA-004', name: '쭐노',       handle: 'junoxox',    emoji: '🐻' },
    { id: 'USER-ZETA-005',  name: '도리도리',   handle: 'doridori',   emoji: '🐟' },
    { id: 'USER-ETA-006',   name: '우당탕탕',   handle: 'udangtang3', emoji: '🐯' },
  ];

  // ── 상태 ──────────────────────────────────
  window.loggedInUserId     = null;
  window.currentBoardUserId = null;
  window.answeringPostId    = null;
  let unsubscribePosts      = null;

  // ── 사용자 목록 렌더 ──────────────────────
  window.renderUserList = function() {
    const list    = document.getElementById('user-list');
    const loading = document.getElementById('loading-users');
    loading.style.display = 'none';
    list.innerHTML = '';
    window.USERS.forEach(user => {
      const isOwner = window.loggedInUserId === user.id;
      const el = document.createElement('div');
      el.className = 'user-item';
      el.innerHTML = `
        <div class="avatar">${user.emoji}</div>
        <div class="user-info">
          <div class="user-name">${user.name}${isOwner ? '<span class="badge-owner">나</span>' : ''}</div>
          <div class="user-id">@${user.handle}</div>
        </div>
        <button class="btn-enter" onclick="enterBoard('${user.id}')">게시판 입장</button>
      `;
      list.appendChild(el);
    });
  };

  // ── 게시판 입장 ───────────────────────────
  window.enterBoard = async function(userId) {
    window.currentBoardUserId = userId;
    const user = window.USERS.find(u => u.id === userId);

    document.getElementById('board-title').textContent    = user.name + '의 방명록';
    document.getElementById('board-avatar').textContent   = user.emoji;
    document.getElementById('board-name').textContent     = user.name;
    document.getElementById('board-code-display').textContent = '@' + user.handle;
    document.getElementById('stat-posts').textContent     = '-';
    document.getElementById('stat-answers').textContent   = '-';
    document.getElementById('posts-container').innerHTML  = '';
    document.getElementById('write-text').value           = '';
    document.getElementById('char-count').textContent     = '0';
    document.getElementById('loading-posts').style.display = 'flex';

    document.getElementById('screen-list').classList.remove('active');
    document.getElementById('screen-board').classList.add('active');
    window.scrollTo(0, 0);

    // 기존 리스너 해제
    if (unsubscribePosts) { unsubscribePosts(); unsubscribePosts = null; }

    // 실시간 게시물 구독
    const postsRef = collection(db, 'boards', userId, 'posts');
    const q = query(postsRef, orderBy('createdAt', 'desc'));

    unsubscribePosts = onSnapshot(q, snapshot => {
      document.getElementById('loading-posts').style.display = 'none';
      const posts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      document.getElementById('stat-posts').textContent   = posts.length;
      document.getElementById('stat-answers').textContent = posts.filter(p => p.answer).length;
      renderPosts(posts, userId);
    });
  };

  window.goBack = function() {
    if (unsubscribePosts) { unsubscribePosts(); unsubscribePosts = null; }
    document.getElementById('screen-board').classList.remove('active');
    document.getElementById('screen-list').classList.add('active');
    window.currentBoardUserId = null;
  };

  // ── 게시물 렌더 ───────────────────────────
  function renderPosts(posts, userId) {
    const container = document.getElementById('posts-container');
    const user      = window.USERS.find(u => u.id === userId);
    const isOwner   = window.loggedInUserId === userId;

    if (posts.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">✉️</div>
          <div class="empty-text">아직 메시지가 없어요.<br>첫 번째 메시지를 남겨보세요!</div>
        </div>`;
      return;
    }

    container.innerHTML = posts.map(post => {
      const dateStr = post.createdAt
        ? new Date(post.createdAt.seconds * 1000).toLocaleDateString('ko-KR')
        : '';
      const answerDateStr = post.answer?.answeredAt
        ? new Date(post.answer.answeredAt.seconds * 1000).toLocaleDateString('ko-KR')
        : '';

      return `
        <div class="post-card" id="post-${post.id}">
          <div class="post-q">
            <div class="post-q-label">Q 익명</div>
            <div class="post-q-text">${escHtml(post.text)}</div>
            <div style="font-size:11px;color:var(--gray-300);margin-top:6px">${dateStr}</div>
          </div>
          ${post.answer
            ? `<div class="post-a">
                <div class="post-a-avatar">${user.emoji}</div>
                <div class="post-a-body">
                  <div class="post-a-name">${user.name}</div>
                  <div class="post-a-text">${escHtml(post.answer.text)}</div>
                  <div class="post-a-date">${answerDateStr}</div>
                </div>
              </div>`
            : `<div class="no-answer">
                <div class="no-answer-text">아직 답변이 없어요</div>
                ${isOwner
                  ? `<button class="btn-answer" onclick="openAnswerModal('${post.id}','${escHtml(post.text).replace(/'/g,"\\'")}')">답변하기</button>`
                  : ''}
              </div>`
          }
        </div>`;
    }).join('');
  }

  // ── 메시지 전송 ───────────────────────────
  window.submitMessage = async function() {
    const text = document.getElementById('write-text').value.trim();
    if (!text) { showToast('메시지를 입력해 주세요 ✏️'); return; }
    const btn = document.querySelector('.btn-send');
    btn.disabled = true;
    btn.textContent = '전송 중...';
    try {
      await addDoc(collection(db, 'boards', window.currentBoardUserId, 'posts'), {
        text,
        createdAt: serverTimestamp(),
        answer: null
      });
      document.getElementById('write-text').value = '';
      document.getElementById('char-count').textContent = '0';
      showToast('메시지가 익명으로 전달됐어요 ✉️');
    } catch(e) {
      showToast('전송 실패. 잠시 후 다시 시도해 주세요 ⚠️');
    }
    btn.disabled = false;
    btn.textContent = '보내기';
  };

  // ── 답변 모달 ─────────────────────────────
  window.openAnswerModal = function(postId, previewText) {
    if (!window.loggedInUserId) { openLoginModal(); return; }
    if (window.loggedInUserId !== window.currentBoardUserId) {
      showToast('본인 방명록에만 답변할 수 있어요 🔒'); return;
    }
    window.answeringPostId = postId;
    document.getElementById('answer-q-preview').textContent = previewText;
    document.getElementById('answer-text').value = '';
    document.getElementById('modal-answer').classList.add('open');
  };

  window.submitAnswer = async function() {
    const text = document.getElementById('answer-text').value.trim();
    if (!text) { showToast('답변 내용을 입력해 주세요 ✏️'); return; }
    const btn = document.querySelector('#modal-answer .btn-confirm');
    btn.disabled = true; btn.textContent = '등록 중...';
    try {
      const postRef = doc(db, 'boards', window.currentBoardUserId, 'posts', window.answeringPostId);
      await updateDoc(postRef, {
        answer: { text, answeredAt: serverTimestamp() }
      });
      closeModal('modal-answer');
      showToast('답변이 등록됐어요 💬');
    } catch(e) {
      showToast('등록 실패. 잠시 후 다시 시도해 주세요 ⚠️');
    }
    btn.disabled = false; btn.textContent = '답변 등록';
  };

  // ── 코드 로그인 ───────────────────────────
  window.openLoginModal = function() {
    document.getElementById('input-code').value = '';
    document.getElementById('login-error').classList.remove('show');
    document.getElementById('modal-login').classList.add('open');
  };

  window.loginWithCode = function() {
    const code = document.getElementById('input-code').value.trim().toUpperCase();
    const user = window.USERS.find(u => u.id === code);
    if (!user) { document.getElementById('login-error').classList.add('show'); return; }
    window.loggedInUserId = user.id;
    // 배지 표시
    const badge = document.getElementById('logged-in-badge');
    badge.textContent = user.emoji + ' ' + user.name;
    badge.style.display = 'flex';
    document.getElementById('btn-login-icon').style.display = 'none';
    closeModal('modal-login');
    renderUserList();
    showToast(`${user.name}님으로 인증되었어요 ✅`);
  };

  window.clearLoginError = function() {
    document.getElementById('login-error').classList.remove('show');
  };

  // ── 공통 헬퍼 ────────────────────────────
  window.closeModal = function(id) {
    document.getElementById(id).classList.remove('open');
  };

  window.showToast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  };

  window.updateCharCount = function() {
    document.getElementById('char-count').textContent =
      document.getElementById('write-text').value.length;
  };

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  // 모달 배경 클릭 닫기
  document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
  });
  document.getElementById('input-code').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.loginWithCode();
  });

  // ── 초기화 ───────────────────────────────
  renderUserList();
</script>
</body>
</html>
