<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const USERS = [
  { id: 'USER-ALPHA-001', name: '닉넴변경함', handle: '1ky10yk',   emoji: '🐼' },
  { id: 'USER-BETA-002',  name: '샤인머스캣', handle: '90grape',   emoji: '🍇' },
  { id: 'USER-GAMMA-003', name: 'ttuu',       handle: 'tttuuu',    emoji: '🎵' },
  { id: 'USER-DELTA-004', name: '쭈노',       handle: 'junoxox',   emoji: '🐻' },
  { id: 'USER-ZETA-005',  name: '도리도리',   handle: 'doridori',  emoji: '🐟' },
  { id: 'USER-ETA-006',   name: '우당탕탕',   handle: 'udangtang3',emoji: '🐯' },
];

// Posts storage: { [userId]: [{id, text, date, answer}] }
const POSTS_DB = {};
USERS.forEach(u => { POSTS_DB[u.id] = []; });

// Seed sample posts
POSTS_DB['USER-ALPHA-001'].push(
  { id: 'p1', text: '안녕하세요! 오늘 하루 어떠셨나요? 😊', date: '2024.03.12', answer: { text: '덕분에 좋았어요! 감사합니다 🙌', date: '2024.03.12' } },
  { id: 'p2', text: '최근에 즐겨 듣는 노래 있으세요?', date: '2024.03.11', answer: null },
);
POSTS_DB['USER-BETA-002'].push(
  { id: 'p3', text: '포도 좋아하세요??', date: '2024.03.10', answer: { text: '네 너무 좋아요 🍇', date: '2024.03.10' } },
);

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let loggedInUserId = null; // code-verified user
let currentBoardUserId = null;
let answeringPostId = null;

// ═══════════════════════════════════════
// RENDER USER LIST
// ═══════════════════════════════════════
function renderUserList() {
  const list = document.getElementById('user-list');
  list.innerHTML = '';
  USERS.forEach(user => {
    const isOwner = loggedInUserId === user.id;
    const el = document.createElement('div');
    el.className = 'user-item';
    el.innerHTML = `
      <div class="avatar">${user.emoji}</div>
      <div class="user-info">
        <div class="user-name">${user.name}${isOwner ? '<span class="badge-owner">나</span>' : ''}</div>
        <div class="user-id">@${user.handle}</div>
      </div>
      <button class="btn-enter" onclick="enterBoard('${user.id}')">게시판 입장</button>
    `;
    list.appendChild(el);
  });
}

// ═══════════════════════════════════════
// ENTER BOARD
// ═══════════════════════════════════════
function enterBoard(userId) {
  currentBoardUserId = userId;
  const user = USERS.find(u => u.id === userId);
  const posts = POSTS_DB[userId];

  document.getElementById('board-title').textContent = user.name + '의 방명록';
  document.getElementById('board-avatar').textContent = user.emoji;
  document.getElementById('board-name').textContent = user.name;
  document.getElementById('board-code-display').textContent = '@' + user.handle;

  document.getElementById('stat-posts').textContent = posts.length;
  document.getElementById('stat-answers').textContent = posts.filter(p => p.answer).length;

  renderPosts(userId);

  document.getElementById('screen-list').classList.remove('active');
  document.getElementById('screen-board').classList.add('active');
  document.getElementById('write-text').value = '';
  document.getElementById('char-count').textContent = '0';
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('screen-board').classList.remove('active');
  document.getElementById('screen-list').classList.add('active');
  currentBoardUserId = null;
}

// ═══════════════════════════════════════
// RENDER POSTS
// ═══════════════════════════════════════
function renderPosts(userId) {
  const container = document.getElementById('posts-container');
  const posts = POSTS_DB[userId];
  const user = USERS.find(u => u.id === userId);
  const isOwner = loggedInUserId === userId;

  if (posts.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">✉️</div>
        <div class="empty-text">아직 메시지가 없어요.<br>첫 번째 메시지를 남겨보세요!</div>
      </div>`;
    return;
  }

  container.innerHTML = [...posts].reverse().map(post => `
    <div class="post-card" id="post-${post.id}">
      <div class="post-q">
        <div class="post-q-label">Q 익명</div>
        <div class="post-q-text">${escHtml(post.text)}</div>
        <div style="font-size:11px;color:var(--gray-300);margin-top:6px">${post.date}</div>
      </div>
      ${post.answer
        ? `<div class="post-a">
            <div class="post-a-avatar">${user.emoji}</div>
            <div class="post-a-body">
              <div class="post-a-name">${user.name}</div>
              <div class="post-a-text">${escHtml(post.answer.text)}</div>
              <div class="post-a-date">${post.answer.date}</div>
            </div>
          </div>`
        : `<div class="no-answer">
            <div class="no-answer-text">아직 답변이 없어요</div>
            ${isOwner
              ? `<button class="btn-answer" onclick="openAnswerModal('${post.id}')">답변하기</button>`
              : ''}
          </div>`
      }
    </div>
  `).join('');
}

// ═══════════════════════════════════════
// SUBMIT MESSAGE (anonymous)
// ═══════════════════════════════════════
function submitMessage() {
  const text = document.getElementById('write-text').value.trim();
  if (!text) { showToast('메시지를 입력해 주세요 ✏️'); return; }

  const now = new Date();
  const date = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  const post = { id: 'p' + Date.now(), text, date, answer: null };

  POSTS_DB[currentBoardUserId].unshift(post);
  document.getElementById('write-text').value = '';
  document.getElementById('char-count').textContent = '0';

  refreshBoardStats();
  renderPosts(currentBoardUserId);
  showToast('메시지가 익명으로 전달됐어요 ✉️');
}

function updateCharCount() {
  const len = document.getElementById('write-text').value.length;
  document.getElementById('char-count').textContent = len;
}

// ═══════════════════════════════════════
// ANSWER MODAL
// ═══════════════════════════════════════
function openAnswerModal(postId) {
  if (!loggedInUserId) { openLoginModal(); return; }
  if (loggedInUserId !== currentBoardUserId) {
    showToast('본인 방명록에만 답변할 수 있어요 🔒'); return;
  }
  answeringPostId = postId;
  const post = POSTS_DB[currentBoardUserId].find(p => p.id === postId);
  document.getElementById('answer-q-preview').textContent = post.text;
  document.getElementById('answer-text').value = '';
  document.getElementById('modal-answer').classList.add('open');
}

function submitAnswer() {
  const text = document.getElementById('answer-text').value.trim();
  if (!text) { showToast('답변 내용을 입력해 주세요 ✏️'); return; }

  const now = new Date();
  const date = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  const post = POSTS_DB[currentBoardUserId].find(p => p.id === answeringPostId);
  post.answer = { text, date };

  closeModal('modal-answer');
  refreshBoardStats();
  renderPosts(currentBoardUserId);
  showToast('답변이 등록됐어요 💬');
}

// ═══════════════════════════════════════
// CODE LOGIN
// ═══════════════════════════════════════
function openLoginModal() {
  document.getElementById('input-code').value = '';
  document.getElementById('login-error').classList.remove('show');
  document.getElementById('modal-login').classList.add('open');
}

function loginWithCode() {
  const code = document.getElementById('input-code').value.trim().toUpperCase();
  const user = USERS.find(u => u.id === code);
  if (!user) {
    document.getElementById('login-error').classList.add('show');
    return;
  }
  loggedInUserId = user.id;
  closeModal('modal-login');
  renderUserList();
  if (currentBoardUserId) renderPosts(currentBoardUserId);
  showToast(`${user.name}님으로 인증되었어요 ✅`);
}

function clearLoginError() {
  document.getElementById('login-error').classList.remove('show');
}

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function refreshBoardStats() {
  const posts = POSTS_DB[currentBoardUserId];
  document.getElementById('stat-posts').textContent = posts.length;
  document.getElementById('stat-answers').textContent = posts.filter(p => p.answer).length;
}

// close modal on backdrop click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// Enter key submit for login
document.getElementById('input-code').addEventListener('keydown', e => {
  if (e.key === 'Enter') loginWithCode();
});

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderUserList();
</script>
</body>
</html>
